<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" opacity="0.06">
  <!-- South Korea: Taegeuk (yin-yang) + Trigrams -->
  <g transform="translate(100, 100)">
    <!-- Taegeuk symbol -->
    <circle cx="100" cy="100" r="80" fill="none" stroke="#1a3a5f" stroke-width="3"/>
    
    <!-- Yin-Yang pattern -->
    <path d="M100,20 A80,80 0 0,1 100,180 A40,40 0 0,1 100,100 A40,40 0 0,0 100,20" fill="#1a3a5f"/>
    <circle cx="100" cy="60" r="12" fill="#fff"/>
    <circle cx="100" cy="140" r="12" fill="#1a3a5f"/>
  </g>
  
  <!-- Four trigrams (simplified) -->
  <g stroke="#1a3a5f" stroke-width="4" fill="none">
    <!-- Top left (Geon - Heaven) -->
    <line x1="40" y1="50" x2="80" y2="50"/>
    <line x1="40" y1="60" x2="80" y2="60"/>
    <line x1="40" y1="70" x2="80" y2="70"/>
    
    <!-- Top right (Gam - Water) -->
    <line x1="320" y1="50" x2="360" y2="50"/>
    <line x1="320" y1="60" x2="335" y2="60"/>
    <line x1="345" y1="60" x2="360" y2="60"/>
    <line x1="320" y1="70" x2="360" y2="70"/>
    
    <!-- Bottom left (Ri - Fire) -->
    <line x1="40" y1="330" x2="80" y2="330"/>
    <line x1="40" y1="340" x2="55" y2="340"/>
    <line x1="65" y1="340" x2="80" y2="340"/>
    <line x1="40" y1="350" x2="80" y2="350"/>
    
    <!-- Bottom right (Gon - Earth) -->
    <line x1="320" y1="330" x2="335" y2="330"/>
    <line x1="345" y1="330" x2="360" y2="330"/>
    <line x1="320" y1="340" x2="335" y2="340"/>
    <line x1="345" y1="340" x2="360" y2="340"/>
    <line x1="320" y1="350" x2="335" y2="350"/>
    <line x1="345" y1="350" x2="360" y2="350"/>
  </g>
</svg>
