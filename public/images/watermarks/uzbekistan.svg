<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" opacity="0.06">
  <!-- Uzbekistan: Humo Bird (mythical bird) simplified + 12-pointed star pattern -->
  <defs>
    <pattern id="uzbek-pattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- 12-pointed star (from flag) -->
      <polygon points="50,5 54,20 70,20 57,30 62,45 50,35 38,45 43,30 30,20 46,20" fill="#1a3a5f" opacity="0.5"/>
    </pattern>
  </defs>
  
  <!-- Central Humo Bird silhouette -->
  <g transform="translate(100, 80)" fill="#1a3a5f">
    <!-- Simplified phoenix/humo bird -->
    <path d="M100,20 Q120,0 140,20 Q160,10 170,30 Q190,25 195,50 Q210,60 200,90 
             Q220,110 200,130 Q210,160 180,170 Q170,200 140,190 Q120,210 100,190 
             Q80,210 60,190 Q30,200 20,170 Q-10,160 0,130 Q-20,110 0,90 
             Q-10,60 5,50 Q10,25 30,30 Q40,10 60,20 Q80,0 100,20 Z"/>
    <!-- Inner wing details -->
    <ellipse cx="100" cy="100" rx="50" ry="40" fill="none" stroke="#1a3a5f" stroke-width="2"/>
    <ellipse cx="100" cy="100" rx="30" ry="25" fill="none" stroke="#1a3a5f" stroke-width="1"/>
  </g>

  <!-- Decorative star border pattern -->
  <rect x="0" y="0" width="400" height="400" fill="url(#uzbek-pattern)" opacity="0.3"/>
</svg>
