<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" opacity="0.06">
  <!-- Spain: Pillars of Hercules + Castle and Lion from coat of arms -->
  
  <!-- Pillars of Hercules (with Plus Ultra ribbon concept) -->
  <g transform="translate(30, 100)" fill="#1a3a5f">
    <rect x="0" y="0" width="20" height="200" rx="3"/>
    <rect x="0" y="-15" width="30" height="20" rx="2"/>
  </g>
  <g transform="translate(350, 100)" fill="#1a3a5f">
    <rect x="0" y="0" width="20" height="200" rx="3"/>
    <rect x="-10" y="-15" width="30" height="20" rx="2"/>
  </g>
  
  <!-- Castle of Castile (simplified) -->
  <g transform="translate(100, 80)" fill="#1a3a5f">
    <rect x="0" y="40" width="80" height="80"/>
    <!-- Towers -->
    <rect x="-10" y="20" width="25" height="100"/>
    <rect x="65" y="20" width="25" height="100"/>
    <!-- Battlements -->
    <rect x="-10" y="10" width="8" height="15"/>
    <rect x="2" y="10" width="8" height="15"/>
    <rect x="65" y="10" width="8" height="15"/>
    <rect x="77" y="10" width="8" height="15"/>
    <rect x="30" y="30" width="8" height="15"/>
    <rect x="42" y="30" width="8" height="15"/>
    <!-- Door -->
    <rect x="30" y="80" width="20" height="40" fill="#fff"/>
  </g>
  
  <!-- Lion of León (simplified, rampant) -->
  <g transform="translate(220, 100)" fill="#1a3a5f">
    <path d="M40,0 Q50,-5 55,5 L60,20 L55,35 L70,55 L65,75 L80,95 L65,105 
             L50,90 L35,105 L20,95 L35,75 L25,55 L40,35 L30,20 Z"/>
    <!-- Mane -->
    <circle cx="47" cy="5" r="12" fill="none" stroke="#1a3a5f" stroke-width="3"/>
  </g>
</svg>
