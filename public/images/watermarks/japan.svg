<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" opacity="0.06">
  <!-- Japan: Mount Fuji silhouette + Cherry blossom pattern + Rising sun rays -->
  <defs>
    <pattern id="sakura" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <!-- Cherry blossom (sakura) -->
      <g fill="#1a3a5f" opacity="0.4">
        <circle cx="25" cy="20" r="4"/>
        <circle cx="20" cy="28" r="4"/>
        <circle cx="30" cy="28" r="4"/>
        <circle cx="22" cy="35" r="4"/>
        <circle cx="28" cy="35" r="4"/>
        <circle cx="25" cy="28" r="2"/>
      </g>
    </pattern>
  </defs>
  
  <!-- Sun rays (subtle) -->
  <g stroke="#1a3a5f" stroke-width="1" opacity="0.3">
    <line x1="200" y1="50" x2="200" y2="0"/>
    <line x1="200" y1="50" x2="250" y2="0"/>
    <line x1="200" y1="50" x2="150" y2="0"/>
    <line x1="200" y1="50" x2="300" y2="10"/>
    <line x1="200" y1="50" x2="100" y2="10"/>
  </g>
  
  <!-- Mount Fuji silhouette -->
  <g transform="translate(80, 200)" fill="#1a3a5f">
    <path d="M0,150 L80,50 Q100,30 120,50 L200,150 Z"/>
    <!-- Snow cap -->
    <path d="M80,50 Q100,30 120,50 L110,70 Q100,60 90,70 Z" fill="#1a3a5f" opacity="0.5"/>
  </g>
  
  <!-- Sakura pattern overlay -->
  <rect x="0" y="0" width="400" height="150" fill="url(#sakura)"/>
</svg>
