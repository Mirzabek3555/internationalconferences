<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" opacity="0.06">
  <!-- Kazakhstan: Shanyrak (roof crown of yurt) - national symbol -->
  <g transform="translate(100, 100)" fill="none" stroke="#1a3a5f" stroke-width="3">
    <!-- Outer circle (shanyrak frame) -->
    <circle cx="100" cy="100" r="90"/>
    <circle cx="100" cy="100" r="80"/>
    
    <!-- Cross pattern inside shanyrak -->
    <line x1="100" y1="20" x2="100" y2="180"/>
    <line x1="20" y1="100" x2="180" y2="100"/>
    
    <!-- Diagonal supports -->
    <line x1="43" y1="43" x2="157" y2="157"/>
    <line x1="157" y1="43" x2="43" y2="157"/>
    
    <!-- Additional radial lines -->
    <line x1="100" y1="20" x2="60" y2="60"/>
    <line x1="100" y1="20" x2="140" y2="60"/>
    <line x1="180" y1="100" x2="140" y2="60"/>
    <line x1="180" y1="100" x2="140" y2="140"/>
    <line x1="100" y1="180" x2="140" y2="140"/>
    <line x1="100" y1="180" x2="60" y2="140"/>
    <line x1="20" y1="100" x2="60" y2="140"/>
    <line x1="20" y1="100" x2="60" y2="60"/>
    
    <!-- Center ornament -->
    <circle cx="100" cy="100" r="20" fill="#1a3a5f"/>
    <circle cx="100" cy="100" r="10" fill="none" stroke="#fff"/>
  </g>
  
  <!-- Winged horses (tulpar) silhouettes on sides -->
  <g transform="translate(20, 280)" fill="#1a3a5f" opacity="0.5">
    <path d="M0,30 Q10,20 20,25 Q30,15 40,20 L50,40 L30,50 L10,45 Z"/>
  </g>
  <g transform="translate(330, 280)" fill="#1a3a5f" opacity="0.5">
    <path d="M50,30 Q40,20 30,25 Q20,15 10,20 L0,40 L20,50 L40,45 Z"/>
  </g>
</svg>
