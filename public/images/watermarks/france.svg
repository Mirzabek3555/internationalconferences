<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" opacity="0.06">
  <!-- France: Marianne profile + Fleur-de-lis pattern -->
  <defs>
    <pattern id="fleur-de-lis" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <!-- Simplified fleur-de-lis -->
      <path d="M25,5 Q25,15 30,20 Q35,15 35,25 Q40,30 35,35 L30,30 L30,45 L25,40 L20,45 L20,30 L15,35 Q10,30 15,25 Q15,15 20,20 Q25,15 25,5" 
            fill="#1a3a5f" opacity="0.4"/>
    </pattern>
  </defs>
  
  <!-- Fleur-de-lis border pattern -->
  <rect x="0" y="0" width="80" height="400" fill="url(#fleur-de-lis)"/>
  <rect x="320" y="0" width="80" height="400" fill="url(#fleur-de-lis)"/>
  
  <!-- Marianne profile silhouette (Liberty symbol) -->
  <g transform="translate(120, 80)" fill="#1a3a5f">
    <!-- Head profile -->
    <path d="M80,0 Q100,10 110,40 Q115,70 110,100 Q100,130 80,150 
             Q60,160 50,150 L55,130 Q65,120 70,100 Q75,80 70,60 
             Q65,40 60,30 Q70,20 80,0 Z"/>
    
    <!-- Phrygian cap (liberty cap) -->
    <path d="M60,30 Q50,10 70,0 Q90,0 100,20 Q95,30 80,35 Q70,35 60,30 Z"/>
    <circle cx="85" cy="10" r="5"/>
  </g>
  
  <!-- Tricolor stripe hints (very subtle) -->
  <rect x="150" y="300" width="30" height="60" fill="#1a3a5f" opacity="0.2"/>
  <rect x="185" y="300" width="30" height="60" fill="#1a3a5f" opacity="0.1"/>
  <rect x="220" y="300" width="30" height="60" fill="#1a3a5f" opacity="0.2"/>
</svg>
